schema_version: "0.1"
record_type: parallel_lane_map
status: draft

identity:
  work_id: workflow-ui-commondb-20260608
  project_id: workflow-ui-commondb-20260608
  created_at: "2026-06-08"

governance:
  map_owner: agent
  update_rule: "Update this map before assigning or changing any parallel lane. It is a planning and handoff record, not a runtime queue, lock ledger, scheduler, worker heartbeat, dashboard, or worktree inventory."
  context_budget:
    required_source_refs_per_lane_max: 6
    deny_broad_repo_scan: true

git_scope:
  mode: parallel
  base_ref: origin/main
  merge_target: origin/main
  conflict_policy: explicitly_scoped
  sibling_branch_refs: []

lanes:
  - lane: external-docs
    status: planned
    owner: unassigned
    task_intent: "Create external-facing foundation overview and minimal demo narrative."
    source_refs:
      - AGENTS.md
      - README.md
      - docs/01-agent-operating-contract.md
      - docs/02-output-verification-contract.md
      - docs/03-repo-boundary-and-storage-contract.md
      - Plan/workflow-ui-commondb-20260608/plans/Plan_N0001.md
    allowed_write_targets:
      - README.md
      - artifact/workflow-ui-commondb-20260608/output/docs/external-facing-overview.md
      - artifact/workflow-ui-commondb-20260608/output/demos/demo-foundation-overview
    denied_context:
      - secrets
      - runtime_state
      - broad_logs
      - unrelated_history
    expected_outputs:
      - "External-facing repo overview with current runnable surfaces, non-goals, verification, and human gates."
    verification_required:
      - "Inspect changed docs and links."
      - make check-fast
      - "Run make check-foundation before PR handoff if tools are available."
    branch_target: agent/workflow-ui-commondb-20260608/external-docs/external-overview
    worktree_target: ../worktrees/Dev-Foundation-ver2/workflow-ui-commondb-20260608-external-docs

  - lane: workflow-core
    status: planned
    owner: unassigned
    task_intent: "Define Workflow Core state, approved work contracts, and state transition checks."
    source_refs:
      - AGENTS.md
      - templates/work-contract.yaml
      - templates/parallel-lane-map.yaml
      - docs/reference/packet-evidence-and-rework-reference.md
      - docs/reference/git-worktree-and-branch-reference.md
      - Plan/workflow-ui-commondb-20260608/plans/Plan_N0001.md
    allowed_write_targets:
      - src/workflow_core
      - tests/workflow_core
      - templates/workflow-core
      - templates/approved-work-contract.yaml
      - artifact/workflow-ui-commondb-20260608/output/docs/workflow-core-state-model.md
      - scripts/check-workflow-state.py
      - Makefile
    denied_context:
      - secrets
      - runtime_state
      - raw_codex_thread_bodies
      - unrelated_project_logs
    expected_outputs:
      - "Workflow state model, approved contract schema, transition checker, and targeted tests."
    verification_required:
      - uv run pytest tests/workflow_core -q
      - make check-contracts
      - make check-fast
      - "Run make check-required if Makefile or shared checker wiring changes."
    branch_target: agent/workflow-ui-commondb-20260608/workflow-core/state-model
    worktree_target: ../worktrees/Dev-Foundation-ver2/workflow-ui-commondb-20260608-workflow-core

  - lane: codex-runner
    status: planned
    owner: unassigned
    task_intent: "Add a headless Codex SDK execution adapter around approved work contracts."
    source_refs:
      - AGENTS.md
      - docs/01-agent-operating-contract.md
      - docs/02-output-verification-contract.md
      - docs/reference/verification-ci-and-pr-reference.md
      - Plan/workflow-ui-commondb-20260608/plans/Plan_N0001.md
    allowed_write_targets:
      - src/workflow_adapters/codex_sdk_adapter.py
      - scripts/run-approved-work-contract.py
      - templates/codex-sdk-run-config.yaml
      - artifact/workflow-ui-commondb-20260608/output/demos/demo-codex-sdk-run
      - tests/workflow_adapters
    denied_context:
      - secrets
      - raw_terminal_logs
      - raw_codex_thread_bodies
      - external_write_without_human_gate
    expected_outputs:
      - "Mockable SDK adapter, runner script, run config template, demo artifact, and tests."
    verification_required:
      - uv run pytest tests/workflow_adapters -q
      - make check-fast
      - "Record real SDK smoke as skipped unless explicitly human-approved."
    branch_target: agent/workflow-ui-commondb-20260608/codex-runner/sdk-runner
    worktree_target: ../worktrees/Dev-Foundation-ver2/workflow-ui-commondb-20260608-codex-runner

  - lane: app-server-ui
    status: planned
    owner: unassigned
    task_intent: "Design and later prototype App Server-managed workflow UI surfaces without making App Server the state source of truth."
    source_refs:
      - AGENTS.md
      - README.md
      - docs/01-agent-operating-contract.md
      - docs/02-output-verification-contract.md
      - docs/03-repo-boundary-and-storage-contract.md
      - Plan/workflow-ui-commondb-20260608/plans/Plan_N0001.md
    allowed_write_targets:
      - artifact/workflow-ui-commondb-20260608/output/docs/app-server-ui-adapter-design.md
      - templates/app-server-thread-link.yaml
      - templates/app-server-run-event.yaml
      - app/workflow_console
      - src/workflow_ui
      - src/workflow_adapters/codex_app_server_adapter.py
      - tests/workflow_ui
      - tests/workflow_adapters
    denied_context:
      - secrets
      - browser_sessions
      - raw_codex_thread_bodies
      - local_runtime_state
    expected_outputs:
      - "App Server adapter design, mock workflow console, and human-gated bridge scope."
    verification_required:
      - "Inspect design and templates."
      - uv run pytest tests/workflow_ui tests/workflow_adapters -q
      - make check-fast
      - "Record real App Server smoke as skipped unless explicitly human-approved."
    branch_target: agent/workflow-ui-commondb-20260608/app-server-ui/console-adapter
    worktree_target: ../worktrees/Dev-Foundation-ver2/workflow-ui-commondb-20260608-app-server-ui

  - lane: demo-context
    status: planned
    owner: unassigned
    task_intent: "Add CommonDB context adapter contracts and a sanitized dual-repo demo artifact."
    source_refs:
      - AGENTS.md
      - docs/01-agent-operating-contract.md
      - docs/03-repo-boundary-and-storage-contract.md
      - templates/work-contract.yaml
      - Plan/workflow-ui-commondb-20260608/plans/Plan_N0001.md
    allowed_write_targets:
      - artifact/workflow-ui-commondb-20260608/output/docs/commondb-context-adapter-contract.md
      - src/workflow_adapters/commondb_context_adapter.py
      - templates/context-request.yaml
      - templates/context-result.yaml
      - artifact/workflow-ui-commondb-20260608/output/demos/demo-workflow-001
      - artifact/workflow-ui-commondb-20260608/output/demos/demo-workflow-commondb-run
      - scripts/check-demo-workflow.py
      - tests/workflow_core
      - tests/workflow_adapters
    denied_context:
      - secrets
      - raw_vault_body
      - local_paths
      - qdrant_storage
      - source_body_export
    expected_outputs:
      - "CommonDB context adapter contract, sanitized context/result templates, and dual-repo demo fixture."
    verification_required:
      - uv run pytest tests/workflow_core tests/workflow_adapters -q
      - uv run python scripts/check-demo-workflow.py
      - make check-fast
    branch_target: agent/workflow-ui-commondb-20260608/demo-context/commondb-demo
    worktree_target: ../worktrees/Dev-Foundation-ver2/workflow-ui-commondb-20260608-demo-context

  - lane: integration-readiness
    status: planned
    owner: unassigned
    task_intent: "Prepare cross-repo merge readiness evidence after Dev and CommonDB task branches are individually reviewed."
    source_refs:
      - AGENTS.md
      - docs/02-output-verification-contract.md
      - docs/reference/verification-ci-and-pr-reference.md
      - docs/reference/git-worktree-and-branch-reference.md
      - Plan/workflow-ui-commondb-20260608/plans/Plan_N0001.md
      - Plan/workflow-ui-commondb-20260608/lane-maps/workflow-ui-commondb-20260608.yaml
    allowed_write_targets:
      - Plan/workflow-ui-commondb-20260608
      - artifact/workflow-ui-commondb-20260608
    denied_context:
      - secrets
      - runtime_state
      - raw_logs
      - unapproved_external_writes
    expected_outputs:
      - "Merge readiness packet with changed paths, verification, residual risk, and human gate status for both repos."
    verification_required:
      - make check-lanes
      - make check-fast
      - "Inspect both repos' handoff evidence before recommending human review."
    branch_target: agent/workflow-ui-commondb-20260608/integration-readiness/merge-readiness
    worktree_target: ../worktrees/Dev-Foundation-ver2/workflow-ui-commondb-20260608-integration-readiness

handoff:
  evidence_required:
    - source_refs
    - changed_paths
    - allowed_write_target_check
    - branch_worktree_ownership
    - canonical_primary_freshness
    - pr_handoff_freshness
    - verification_results
    - residual_risk
  next_action: review
