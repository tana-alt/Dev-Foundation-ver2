schema_version: "0.1"
record_type: context_request
status: ready

request_id: context-request-demo-001
workflow_ref: work-contract-demo-001
query: "Provide bounded context for the CommonDB adapter contract demo."
source_refs:
  - "commondb:demo-context:adapter-contract"
requested_artifacts:
  - bounded_snippet
max_snippets: 2
max_snippet_chars: 1200
transport_order:
  - mcp
  - cli
  - http_health
denied_context:
  - vault
  - corpus
  - qdrant
  - local_paths
  - raw_source
  - raw_logs
  - secrets
  - vectors
  - embeddings
  - runtime_state
  - model_memory_fallback
fallback_policy:
  on_unavailable: blocked_context_result
  model_memory_fallback: forbidden
