---
demo_id: demo-foundation-overview
status: outline
purpose: external-facing explanation of the foundation workflow
source_refs:
  - AGENTS.md
  - README.md
  - docs/01-agent-operating-contract.md
  - docs/02-output-verification-contract.md
  - docs/03-repo-boundary-and-storage-contract.md
allowed_write_targets:
  - README.md
  - docs/external-facing-overview.md
  - artifact/demo-foundation-overview/
steps:
  - id: issue_candidate
    summary: Capture a bounded documentation request.
  - id: approved_work_contract
    summary: Confirm source refs, allowed writes, denied context, verification, and human gates.
  - id: execution_run
    summary: Work on an owned agent branch and external worktree.
  - id: verification_result
    summary: Inspect changed docs and run the narrowest feasible local check.
  - id: handoff_artifact
    summary: Report changed files, checks, residual risk, blockers, and human gates.
non_goals:
  - production workflow UI
  - live Codex App Server bridge
  - real SDK write execution
  - runtime queue or lock ledger
  - secret-bearing storage
human_gates:
  - merge
  - release_or_deployment
  - dependency_or_ci_cd_changes
  - real_external_writes
  - credential_or_secret_handling
