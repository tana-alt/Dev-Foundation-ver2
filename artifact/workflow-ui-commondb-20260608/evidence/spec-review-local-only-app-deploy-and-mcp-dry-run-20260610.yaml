observations:
  facts:
    - "The existing personal app spec excludes raw thread bodies, raw memo bodies, secrets, runtime state, browser sessions, automatic Obsidian write-back, and unapproved CommonDB searchability."
    - "The existing Obsidian/CommonDB spec limits CommonDB integration to approved_memo and useful_source intent, separates search permission from searchability approval, and forbids raw bodies, local paths, vector payloads, embeddings, and secrets in audit records."
    - "The current app package is a Swift Package executable targeting macOS v13."
    - "The current app source displays a primary window, mock CommonDB indicators, source refs, gate strip, and Send to Codex App buttons."
  inferences:
    - "Inference: a local-only deploy amendment can safely build on the approved personal app and Obsidian/CommonDB specs without changing their authority model."
    - "Inference: Qdrant must remain explicitly disabled because vector persistence and Qdrant internals are denied by the existing CommonDB boundary."
    - "Inference: MCP dry-run result handling is an agent-context trust boundary because tool output may contain untrusted instructions or unsafe payloads."
  decisions:
    - "Decision: approve the amendment for freeze as a records-only behavior specification."
    - "Decision: keep all implementation lanes planned and unassigned; main_lane must not directly implement."
    - "Decision: treat local install, live MCP, config mutation, indexing/searchability, Obsidian write-back, public exposure, and launch agents as blocked until later human gates."

