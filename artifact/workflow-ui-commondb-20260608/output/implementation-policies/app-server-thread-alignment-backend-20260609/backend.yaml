policy:
  coding_conventions:
    - "Follow the nearby backend adapter and test style."
    - "Keep records structured, deterministic, and easy to inspect from tests."
    - "Prefer explicit blocked/skipped statuses for gated surfaces over implicit success."
  allowed_choices:
    - "Extend the existing mock-safe App Server record mapping when needed to satisfy the approved requirement IDs."
    - "Add or update nearby targeted tests for sanitized refs, bounded summaries, rejection paths, authority preservation, and human-gate behavior."
    - "Represent App Server observations as refs, statuses, booleans, and bounded summaries only."
  forbidden_choices:
    - "Do not run or add live Codex App Server writes."
    - "Do not add CommonDB live search, CommonDB indexing, searchable migration, or vector payload handling in this lane."
    - "Do not add Obsidian write-back."
    - "Do not store raw thread bodies, raw artifact contents, raw terminal logs, browser sessions, credentials, tokens, secrets, or local runtime state."
    - "Do not let App Server events approve contracts, satisfy verification, approve handoff, approve scope amendments, or mark completion."
    - "Do not change the approved specification through implementation policy."

verification:
  required:
    - "Run the smallest targeted backend test covering Codex App Server adapter behavior."
    - "Inspect changed paths for denied raw/protected content and live-integration side effects."
    - "Confirm allowed write targets were not exceeded."
    - "Record skipped or blocked verification with reason and residual risk."
  evidence_required:
    - changed_paths
    - verification_results
    - allowed_write_target_check
    - human_gate_status
    - common_db_live_integration_status
    - residual_risk

human_gates:
  live_app_server_writes: required
  common_db_live_search_or_indexing: required
  obsidian_write_back: required
  merge_deploy_or_protected_git: required
  dependency_or_infrastructure_change: required

handoff:
  next_action: build
