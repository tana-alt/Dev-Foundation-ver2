    - .agents/skills/security-check/SKILL.md
    - artifact/workflow-ui-commondb-20260608/output/specs/personal-mac-workflow-app-spec.md
    - artifact/workflow-ui-commondb-20260608/output/specs/obsidian-commondb-contract-integration-spec.md
    - app/PersonalWorkflowApp/Package.swift
    - app/PersonalWorkflowApp/Sources/PersonalWorkflowApp/PersonalWorkflowApp.swift
    - app/PersonalWorkflowApp/Sources/PersonalWorkflowApp/WorkflowModels.swift
    - app/PersonalWorkflowApp/Sources/PersonalWorkflowApp/WorkflowShellView.swift
  denied_context:
    - unrelated_project_logs
    - broad_repo_scan
    - runtime_state
    - secrets
    - raw_thread_bodies
    - raw_memo_bodies
    - raw_source_bodies
