findings:
  - id: REV-BE-001
    severity: high
    type: authority_boundary
    summary: "App Server JSON-RPC payload can assert Workflow Core completion prerequisites and bypass the explicit blocked completion guard."
    related_ids:
      - REQ-BE-003
      - REQ-BE-004
      - REQ-BE-006
      - AC-BE-010
      - AC-BE-011
      - AC-BE-012
      - AC-BE-018
    source_refs:
      - src/workflow_adapters/codex_app_server_adapter.py:257
      - src/workflow_adapters/codex_app_server_adapter.py:259
      - src/workflow_adapters/codex_app_server_adapter.py:357
      - tests/workflow_adapters/test_codex_app_server_adapter.py:135
    evidence:
      - "map_run_event only blocks completion when requested_next_state == complete."
      - "map_jsonrpc_notification sets workflow_core_completion_prerequisites_met from params_data.get('workflow_core_completion_prerequisites_met', False)."
      - "Probe command output: completion_requested observed unknown not_applicable False."
    impact: "A completion_requested event received from the App Server can be projected as observed with completion_claim_guard=not_applicable when requested_next_state is omitted, or as observed_authority_preserved when the external payload sets workflow_core_completion_prerequisites_met=true. That lets an App Server observation carry a Workflow Core prerequisite claim instead of requiring an authoritative Workflow Core record."
    recommendation: "Do not trust workflow_core_completion_prerequisites_met from App Server event payloads. Completion-related event kinds should remain blocked or explicitly observation-only until a trusted Workflow Core input/evidence path supplies completion prerequisites. Add tests for completion_requested JSON-RPC with omitted requested_next_state and with workflow_core_completion_prerequisites_met=true."

