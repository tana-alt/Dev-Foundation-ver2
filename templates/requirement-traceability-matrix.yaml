schema_version: "0.1"
record_type: requirement_traceability_matrix
status: draft

identity:
  project_id: <project-id>
  work_id: <work-id>
  spec_id: <spec-id>
  created_at: "YYYY-MM-DD"

sources:
  approved_spec_freeze_ref: artifact/<project-id>/output/spec-freezes/<freeze-id>.yaml
  lane_map_ref: Plan/<project-id>/lane-maps/<work-id>.yaml
  inconsistency_register_ref: artifact/<project-id>/output/inconsistency/<work-id>.yaml

coverage:
  functional_requirements:
    - requirement_id: REQ-001
      acceptance_criteria:
        - ac_id: AC-001
          lanes:
            - docs
          implementation_refs:
            - src/<project-id>/
          test_refs:
            - tests/test_<surface>.py
          evidence_refs:
            - artifact/<project-id>/evidence/<evidence-id>.yaml
          verification_refs:
            - artifact/<project-id>/verification/<verification-id>.yaml
          result: passed
          residual_risk:
            - none
  non_functional_requirements:
    - requirement_id: NFR-001
      verification_refs:
        - artifact/<project-id>/verification/<verification-id>.yaml
      result: passed
      blocked_reason: ""
      residual_risk:
        - none
  exception_cases:
    - case_id: EXC-001
      test_refs:
        - tests/test_<surface>.py
      evidence_refs:
        - artifact/<project-id>/evidence/<evidence-id>.yaml
      result: passed
      blocked_reason: ""
      residual_risk:
        - none

handoff:
  open_critical_or_high: false
  next_action: convergence_check
