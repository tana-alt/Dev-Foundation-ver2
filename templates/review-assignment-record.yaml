schema_version: "0.1"
record_type: review_assignment_record
status: draft

identity:
  project_id: example_project
  work_id: example_work_id
  assignment_id: review-assignment-001
  created_at: "YYYY-MM-DDTHH:mm:ssZ"

assignments:
  - reviewer_id: narrow-reviewer-1
    review_mode: narrow
    allowed_inputs:
      - "changed_paths"
    hidden_inputs:
      - "other_review_results"
      - "implementer_self_score"
      - "fix_agent_explanation"
    output_ref: "artifact/<project_id>/reviews/narrow-review-001.yaml"

handoff:
  next_action: continue
