schema_version: "0.1"
record_type: parallel_lane_map
status: draft

identity:
  work_id: <work-id>
  project_id: <project-id>
  created_at: "YYYY-MM-DD"

governance:
  map_owner: "human | agent | scheduler"
  update_rule: "Update this map before assigning or changing any parallel lane. It is not a runtime queue, lock ledger, scheduler, worker heartbeat, dashboard, or worktree inventory."
  context_budget:
    required_source_refs_per_lane_max: 4
    deny_broad_repo_scan: true

git_scope:
  mode: parallel
  base_ref: origin/main
  merge_target: origin/main
  conflict_policy: no_overlap
  sibling_branch_refs: []

spec_scope:
  approved_spec_ref: artifact/<project-id>/output/specs/<spec-id>.md
  spec_review_ref: artifact/<project-id>/evidence/spec-review-<review-id>.yaml
  requirement_ids:
    - REQ-001

lanes:
  - lane: docs
    # status values: planned, assigned, in_progress, ready_for_review, rework, blocked, complete.
    # Use ready_for_review for PR-open, PR-updated, or review-requested handoff.
    # Use complete only after accepted review or final handoff evidence.
    status: planned
    owner: unassigned
    task_intent: "Update routed docs or contracts for the scoped change."
    source_refs:
      - AGENTS.md
      - docs/reference/agent-runtime-and-scope-reference.md
    requirement_ids:
      - REQ-001
    implementation_policy_refs:
      - docs/01-agent-operating-contract.md
      - docs/03-repo-boundary-and-storage-contract.md
    allowed_write_targets:
      - docs/reference/
      - templates/
    denied_context:
      - past_source_material
      - secrets
      - unrelated_project_logs
    expected_outputs:
      - "Doc or template change with source refs cited in handoff."
    verification_required:
      - make check-lanes
      - make check-doc-consistency
      - "Inspect handoff evidence for changed paths, canonical freshness, and residual risk."
    branch_target: agent/<work-id>/docs/<short-slug>
    worktree_target: ../worktrees/<repo>/<work-id>-docs

  - lane: verification
    # status values: planned, assigned, in_progress, ready_for_review, rework, blocked, complete.
    # Use ready_for_review for PR-open, PR-updated, or review-requested handoff.
    # Use complete only after accepted review or final handoff evidence.
    status: planned
    owner: unassigned
    task_intent: "Add or update tests for the scoped contract surface."
    source_refs:
      - tests/test_contract_models.py
      - tests/test_foundation_integrity.py
    requirement_ids:
      - REQ-001
    implementation_policy_refs:
      - pyproject.toml
      - Makefile
    allowed_write_targets:
      - tests/
      - scripts/
    denied_context:
      - past_source_material
      - secrets
      - unrelated_project_logs
    expected_outputs:
      - "Targeted tests or verification helper for the scoped change."
    verification_required:
      - make check-lanes
      - make test-fast
      - "Inspect handoff evidence for changed paths, canonical freshness, and residual risk."
    branch_target: agent/<work-id>/verification/<short-slug>
    worktree_target: ../worktrees/<repo>/<work-id>-verification

handoff:
  evidence_required:
    - source_refs
    - changed_paths
    - allowed_write_target_check
    - branch_worktree_ownership
    - canonical_primary_freshness
    - pr_handoff_freshness
    - verification_results
    - residual_risk
  next_action: "complete | rework | review | continue"
