schema_version: "0.1"
record_type: workflow_run_record
status: draft

identity:
  project_id: <project-id>
  work_id: <work-id>
  goal_id: <goal-id>
  created_at: "YYYY-MM-DD"

phase:
  # PR-open, PR-updated, and review-requested handoffs map to review-oriented
  # phase/next_action values. They do not by themselves make the workflow complete.
  current: goal_set
  next_action: specification_draft

record_refs:
  # Workflow-run records tie the active goal to approved spec, review, lane map,
  # and work-contract refs when those records exist. Lane/work-contract records
  # carry requirement IDs, allowed write targets, branch targets, worktree
  # targets, verification expectations, and handoff evidence expectations.
  goal_ref: artifact/<project-id>/output/goals/<goal-id>.md
  approved_spec_ref: ""
  spec_review_ref: ""
  lane_map_ref: ""
  work_contract_refs: []
  build_result_refs: []
  review_record_refs: []
  integration_review_refs: []
  inconsistency_register_ref: ""
  rework_refs: []
  convergence_check_ref: ""
  final_handoff_ref: ""

communication_rules:
  human_interface: main_lane_only
  goal_trigger: /goal
  goal_loop_owner: main_lane
  subagent_to_human_direct: prohibited
  subagent_to_subagent_direct: prohibited
  state_authority: record_refs_not_conversation
  # This record is not a runtime queue, lock ledger, scheduler, worker
  # heartbeat, dashboard, or local worktree inventory.

human_gates:
  spec_approval:
    required: true
    status: required
    evidence_ref: ""
  final_merge:
    required: true
    status: required
    evidence_ref: ""

open_questions: []
blocked_reasons: []
residual_risk:
  - "none"

handoff:
  # Completion requires accepted review or final handoff evidence, including
  # changed-path scope, reported verification, residual risk, and human gates.
  next_goal_trigger: /goal
  next_action: specification_draft
