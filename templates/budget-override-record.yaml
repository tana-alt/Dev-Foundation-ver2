schema_version: "0.1"
record_type: budget_override_record
status: draft

identity:
  project_id: example_project
  work_id: example_work_id
  agent_role: reviewer
  created_at: "YYYY-MM-DDTHH:mm:ssZ"

override:
  type: source_refs
  base_budget:
    max_selected_skills: 2
    max_source_refs: 6
    max_reference_docs: 2
    broad_repo_scan_allowed: false
  requested_budget:
    max_selected_skills: 2
    max_source_refs: 10
    max_reference_docs: 2
    broad_repo_scan_allowed: false
  reason: "Wide review requires neighboring lane contracts."
  allowed_by:
    - ".agents/skills/review-fix-convergence-governance/SKILL.md"
  applies_to:
    - wide_review

scope_control:
  still_forbidden:
    - broad_repo_scan
    - secrets
    - runtime_state
  narrowed_refs:
    - "artifact/<project_id>/lane-maps/<work_id>.yaml"

source_refs:
  - ref: "artifact/<project_id>/lane-maps/<work_id>.yaml"
    line_range: ""
    purpose: "Neighboring lane contract review."

decision:
  status: approved_by_policy
  reviewer_or_policy_ref: ".agents/skills/review-fix-convergence-governance/SKILL.md"
  residual_risk_ref: ""
