schema_version: "0.1"
record_type: inconsistency_register
status: draft

identity:
  project_id: <project-id>
  work_id: <work-id>
  register_id: <register-id>
  created_at: "YYYY-MM-DD"

scope:
  approved_spec_ref: artifact/<project-id>/output/specs/<spec-id>.md
  lane_map_ref: Plan/<project-id>/lane-maps/<work-id>.yaml
  source_refs:
    - artifact/<project-id>/output/specs/<spec-id>.md
    - Plan/<project-id>/lane-maps/<work-id>.yaml

items:
  - id: INC-001
    type: spec_vs_implementation
    severity: high
    status: open
    summary: "Concise inconsistency summary."
    requirement_ids:
      - REQ-001
    affected_lanes: []
    evidence_refs: []
    required_resolution: "Targeted rework, human decision, or accepted residual risk."
    owner_lane: <lane>
    human_decision_required: false
    rework_ref: ""
    closure:
      resolved_by_refs: []
      verification_ref: ""
      residual_risk: []

handoff:
  open_critical_or_high: true
  next_action: rework
