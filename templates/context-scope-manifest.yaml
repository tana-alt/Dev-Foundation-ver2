schema_version: "0.1"
record_type: context_scope_manifest
status: draft

identity:
  project_id: example_project
  work_id: example_work_id
  agent_role: implementer
  created_at: "YYYY-MM-DDTHH:mm:ssZ"

scope:
  task_intent: "Short task intent."
  selected_skill_refs:
    - ".agents/skills/scope-routing-governance/SKILL.md"
  source_refs_opened:
    - ref: "AGENTS.md"
      reason: "Agent routing entrypoint required by active contract."
  allowed_write_targets:
    - "templates/"
  denied_context:
    - broad_repo_scan
    - all_docs
    - all_reference_docs
    - all_tests
    - secrets
    - runtime_state
    - archive
    - source_docs
  context_expansion: []
  unopened_optional_refs: []

budget:
  max_selected_skills: 2
  max_source_refs: 6
  max_reference_docs: 2
  broad_repo_scan_allowed: false

source_snapshot: []

handoff:
  next_action: continue
  notes: "template example"
