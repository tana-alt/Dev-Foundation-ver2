schema_version: "0.1"
record_type: fix_handoff_record
status: draft

identity:
  project_id: example_project
  work_id: example_work_id
  fix_id: fix-handoff-001
  created_at: "YYYY-MM-DDTHH:mm:ssZ"

source_review_refs:
  - "artifact/<project_id>/reviews/narrow-review-001.yaml#REV-001"

target_lane: example-lane

must_fix:
  - id: FIX-001
    type: requirement_gap
    related_ids:
      - REQ-001
    summary: "What must be fixed."
    source_refs: []

must_not_change:
  - "Explicit non-goal or protected behavior."

verification_required:
  - targeted_unit_test
  - regression_test
  - fix_review

return_to_review_modes:
  - fix_review

handoff:
  assigned_to: owner_lane
  next_action: rework
