schema_version: "0.1"
record_type: context_request
status: draft

request_id: example_context_request_id
workflow_ref: workflow_run_or_work_contract_id
query: "Short bounded context request for the approved workflow task."
source_refs:
  - "commondb:demo-context:example"
requested_artifacts:
  - bounded_snippet
max_snippets: 3
max_snippet_chars: 1200
transport_order:
  - mcp
  - cli
  - http_health
denied_context:
  - vault
  - corpus
  - qdrant
  - local_paths
  - raw_source
  - raw_logs
  - secrets
  - vectors
  - embeddings
  - runtime_state
  - model_memory_fallback
fallback_policy:
  on_unavailable: blocked_context_result
  model_memory_fallback: forbidden
