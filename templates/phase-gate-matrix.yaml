      - "False-positive review required before hook promotion."

promotion_policy:
  pre_commit_requires:
    - checker_present
    - tests_present
    - make_target_present
    - false_positive_reviewed
  pre_push_requires:
    - checker_present
    - tests_present
    - make_target_present
    - false_positive_reviewed
  full_gate_requires:
    - pre_push_allowed
    - negative_fixtures_present
    - required_context_missing_case_present
