default:
  quorum: 3
  reviewers:
    - reader-correctness
    - reader-scope
    - semantic-ai
  background_auto_run: true
  blocking_labels:
    - forbidden_path
    - scope_risk
    - missing_repro
    - acceptance_gap
    - architecture_gap
    - adversarial_test_gap
    - machine_failed
    - protected_contract_edit
    - semantic_gap
    - stale_evidence
    - policy_weakening
    - gate_gaming
    - operation_protocol_leak
profiles:
  semantic-ai:
    kind: command
    command:
      - python3
      - "{repo_root}/.harness/semantic_ai_reviewer.py"
      - "{review_packet}"
      - "{review_output}"
metrics:
  reject_unexpected_actions: false
