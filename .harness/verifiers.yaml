default:
  - id: policy-contract-tests
    command: "uv run pytest -q tests/workflow_core/test_contract_harness_policy_acceptance.py"
    applies_to:
      - .harness/**
      - src/workflow_core/contract_harness/policy.py
      - tests/workflow_core/test_contract_harness_policy_acceptance.py
    always: true
  - id: policy-contract-ruff
    command: "uv run ruff check src/workflow_core/contract_harness/policy.py tests/workflow_core/test_contract_harness_policy_acceptance.py"
    applies_to:
      - src/workflow_core/contract_harness/policy.py
      - tests/workflow_core/test_contract_harness_policy_acceptance.py
    always: true
scopes:
  harness-tools-hooks-test-speed:
    - id: harness-full-pytest-under-5min
      command: "uv run pytest -q"
      applies_to:
        - .harness/**
        - hooks/**
        - scripts/**
        - src/workflow_core/contract_harness/**
        - tests/**
        - pyproject.toml
        - .github/workflows/**
      always: true
      timeout_s: 300
    - id: harness-ruff
      command: "uv run ruff check src/workflow_core/contract_harness scripts tests"
      applies_to:
        - scripts/**
        - src/workflow_core/contract_harness/**
        - tests/**
      always: true
      timeout_s: 120
